name: Build Hybrid ImGui — Complete APK

env:
  NDK_VERSION: "26.3.11579264"
  ANDROID_API:  "29"

on:
  push:
    branches: [ "main", "master", "dev" ]
  workflow_dispatch:

jobs:
  build-native:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        abi: [ "arm64-v8a", "armeabi-v7a" ]
    name: Build Native (${{ matrix.abi }})
    steps:
      - uses: actions/checkout@v4
      - uses: android-actions/setup-android@v3
      - name: Install NDK
        run: |
          sdkmanager "ndk;${{ env.NDK_VERSION }}"
          echo "NDK_HOME=$ANDROID_HOME/ndk/${{ env.NDK_VERSION }}" >> $GITHUB_ENV
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/${{ env.NDK_VERSION }}" >> $GITHUB_ENV
      - name: Build
        run: |
          cmake -S jni -B build/${{ matrix.abi }} \
            -DCMAKE_TOOLCHAIN_FILE="$NDK_HOME/build/cmake/android.toolchain.cmake" \
            -DANDROID_ABI=${{ matrix.abi }} \
            -DANDROID_PLATFORM=android-${{ env.ANDROID_API }} \
            -DANDROID_STL=c++_static \
            -DCMAKE_BUILD_TYPE=Release \
            -G "Unix Makefiles"
          cmake --build build/${{ matrix.abi }} --config Release --target imgui_ext internal injector -j$(nproc)
      - name: Collect
        run: |
          mkdir -p artifacts/${{ matrix.abi }}
          find build/${{ matrix.abi }} -name "libimgui_ext.so" -exec cp {} artifacts/${{ matrix.abi }}/ \;
          find build/${{ matrix.abi }} -name "libinternal.so"  -exec cp {} artifacts/${{ matrix.abi }}/ \;
          # injector adalah ELF executable (tanpa ekstensi .so)
          find build/${{ matrix.abi }} -name "injector" -not -name "*.so" -exec cp {} artifacts/${{ matrix.abi }}/ \;
          
          ls -lh artifacts/${{ matrix.abi }}/
      - uses: actions/upload-artifact@v4
        with:
          name: native-${{ matrix.abi }}
          path: artifacts/${{ matrix.abi }}/
          retention-days: 1

  build-dex:
    runs-on: ubuntu-latest
    name: Build DEX (OverlayMain)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: android-actions/setup-android@v3
      - name: Compile all Java to DEX
        run: |
          sdkmanager "platforms;android-34" "build-tools;34.0.0" 2>/dev/null || true
          ANDROID_JAR="$ANDROID_HOME/platforms/android-34/android.jar"
          echo "=== Java files ==="
          find java/ -name "*.java" | sort
          mkdir -p dex_build/classes
          javac -source 8 -target 8 \
            -cp "$ANDROID_JAR" \
            -d dex_build/classes \
            $(find java/ -name "*.java")
          BUILD_TOOLS=$(ls $ANDROID_HOME/build-tools/ | sort -V | tail -1)
          D8="$ANDROID_HOME/build-tools/$BUILD_TOOLS/d8"
          echo "Using d8: $D8"
          $D8 --lib "$ANDROID_JAR" --output dex_build/ \
            $(find dex_build/classes -name "*.class")
          mv dex_build/classes.dex dex_build/OverlayMain.dex
          ls -lh dex_build/OverlayMain.dex
      - uses: actions/upload-artifact@v4
        with:
          name: overlay-dex
          path: dex_build/OverlayMain.dex
          retention-days: 1

  build-apk:
    runs-on: ubuntu-latest
    needs: [ build-native, build-dex ]
    name: Build APK
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: android-actions/setup-android@v3
      - name: Install tools
        run: sdkmanager "platforms;android-34" "build-tools;34.0.0" 2>/dev/null || true
      - uses: actions/download-artifact@v4
        with:
          name: native-arm64-v8a
          path: app/src/main/assets/jniLibs/arm64-v8a/
      - uses: actions/download-artifact@v4
        with:
          name: native-armeabi-v7a
          path: app/src/main/assets/jniLibs/armeabi-v7a/
      - uses: actions/download-artifact@v4
        with:
          name: overlay-dex
          path: app/src/main/assets/
      - name: Bundle injector binary into assets
        run: |
          # injector (arm64-v8a) di-XOR encrypt lalu masuk assets/injector
          # ModManager.java otomatis detect XOR vs raw saat extract
          BINARY_XOR_KEY=75
          INJECTOR="app/src/main/assets/jniLibs/arm64-v8a/injector"
          if [ ! -f "$INJECTOR" ]; then
            echo "ERROR: injector binary not found at $INJECTOR"
            echo "=== Available files ==="
            find app/src/main/assets/ -type f | sort
            exit 1
          fi
          mkdir -p app/src/main/assets
          python3 -c "
          key=$BINARY_XOR_KEY
          data=open('$INJECTOR','rb').read()
          open('app/src/main/assets/injector','wb').write(bytes(b^key for b in data))
          print('Encrypted injector:', len(data), 'bytes -> assets/injector')
          "
          echo "=== Assets ==="
          ls -lh app/src/main/assets/
      - name: Setup Gradle wrapper
        run: |
          # Pakai gradle yang sudah ada di runner (lebih reliable dari download)
          GRADLE_BIN=$(which gradle 2>/dev/null || echo "")
          if [ -n "$GRADLE_BIN" ]; then
            gradle wrapper --gradle-version=8.4
          else
            # Fallback: download dengan wget + verify
            wget -q "https://services.gradle.org/distributions/gradle-8.4-bin.zip" \
              -O /tmp/gradle-8.4-bin.zip
            unzip -q /tmp/gradle-8.4-bin.zip -d /tmp/gradle-dist/
            /tmp/gradle-dist/gradle-8.4/bin/gradle wrapper --gradle-version=8.4
          fi
          chmod +x gradlew
          echo "Gradle wrapper ready:"
          ./gradlew --version
      - name: Build APK
        run: |
          ./gradlew assembleDebug --no-daemon
          echo "=== APK output ==="
          find app/build/outputs -name "*.apk" | xargs ls -lh 2>/dev/null
      - uses: actions/upload-artifact@v4
        with:
          name: HybridImGuiTool-APK-run${{ github.run_number }}
          path: app/build/outputs/apk/**/*.apk
          retention-days: 30

  summary:
    runs-on: ubuntu-latest
    needs: [ build-native, build-dex, build-apk ]
    if: always()
    steps:
      - name: Summary
        run: |
          echo "## Hybrid ImGui Tool — Run #${{ github.run_number }}" >> $GITHUB_STEP_SUMMARY
          echo "| Artifact | Deskripsi |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-----------|" >> $GITHUB_STEP_SUMMARY
          echo "| \`libimgui_ext.so\` | External UI — ImGui + EGL |" >> $GITHUB_STEP_SUMMARY
          echo "| \`libinternal.so\` | Game Payload — IL2Cpp |" >> $GITHUB_STEP_SUMMARY
          echo "| \`injector\` | Executable — ptrace inject + overlay launch |" >> $GITHUB_STEP_SUMMARY
          echo "| \`OverlayMain.dex\` | Java overlay |" >> $GITHUB_STEP_SUMMARY
          echo "| \`HybridImGuiTool.apk\` | Complete APK |" >> $GITHUB_STEP_SUMMARY
          echo "### Cara Pakai" >> $GITHUB_STEP_SUMMARY
          echo "1. Install APK" >> $GITHUB_STEP_SUMMARY
          echo "2. Grant overlay permission" >> $GITHUB_STEP_SUMMARY
          echo "3. Tap Scan Games lalu pilih game Unity" >> $GITHUB_STEP_SUMMARY
          echo "4. Tap Inject — injector binary otomatis inject + launch overlay" >> $GITHUB_STEP_SUMMARY
          echo "5. Tap hexagon icon untuk buka menu" >> $GITHUB_STEP_SUMMARY
